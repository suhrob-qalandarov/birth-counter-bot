name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build & test
        run: ./gradlew :app:bootJar test --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  provision:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Docker & Docker Compose installed on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          password: ${{ vars.VPS_PASSWORD }}
          port: ${{ vars.VPS_PORT || 22 }}
          script: |
            set -e
            if ! command -v docker >/dev/null 2>&1; then
              echo ">> Docker topilmadi, o'rnatilmoqda..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            else
              echo ">> Docker mavjud: $(docker --version)"
            fi

            if ! docker compose version >/dev/null 2>&1; then
              echo ">> Docker Compose plugin topilmadi, o'rnatilmoqda..."
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update -y && apt-get install -y docker-compose-plugin
              else
                mkdir -p /usr/local/lib/docker/cli-plugins
                curl -fsSL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
                  -o /usr/local/lib/docker/cli-plugins/docker-compose
                chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              fi
            else
              echo ">> Docker Compose mavjud: $(docker compose version)"
            fi

  deploy:
    needs: provision
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_REPO: ${{ github.repository }}
          IMAGE_TAG: latest
          PG_DB: ${{ vars.PG_DB }}
          PG_USER: ${{ vars.PG_USER }}
          PG_PASSWORD: ${{ vars.PG_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_ID: ${{ vars.TELEGRAM_BOT_ID }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_USER_AGREEMENT_LINK: ${{ vars.TELEGRAM_USER_AGREEMENT_LINK }}
          WEBHOOK_FROM_VAR: ${{ vars.TELEGRAM_BOT_WEBHOOK_PATH }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ vars.GHCR_TOKEN }}
          SPRING_PROFILES_ACTIVE: prod
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          password: ${{ vars.VPS_PASSWORD }}
          port: ${{ vars.VPS_PORT || 22 }}
          envs: GHCR_REPO,IMAGE_TAG,PG_DB,PG_USER,PG_PASSWORD,TELEGRAM_BOT_TOKEN,TELEGRAM_BOT_ID,TELEGRAM_BOT_USERNAME,TELEGRAM_USER_AGREEMENT_LINK,WEBHOOK_FROM_VAR,GHCR_USERNAME,GHCR_TOKEN,SPRING_PROFILES_ACTIVE
          script: |
            set -e
            mkdir -p ${{ vars.DEPLOY_PATH }}
            cd ${{ vars.DEPLOY_PATH }}

            # --- docker-compose.yml mavjud bo'lmasa, repodan yuklab olamiz ---
            if [ ! -f docker-compose.yml ]; then
              curl -fsSL -o docker-compose.yml \
                https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml
            fi

            # --- Webhook URL aniqlash ---
            if [ -n "$WEBHOOK_FROM_VAR" ]; then
              echo ">> Webhook URL vars dan olindi"
              WEBHOOK_URL="$WEBHOOK_FROM_VAR"
            else
              echo ">> Webhook var bo'sh — localtunnel orqali vaqtinchalik URL yasaladi"
              if ! command -v node >/dev/null 2>&1; then
                curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
                apt-get install -y nodejs
              fi
              # eski tunnelni to'xtatish
              pkill -f "localtunnel" 2>/dev/null || true
              rm -f /tmp/lt.log
              nohup npx --yes localtunnel --port 8080 > /tmp/lt.log 2>&1 &
              # URL chiqishini kutish
              for i in $(seq 1 20); do
                sleep 2
                WEBHOOK_URL=$(grep -oE 'https://[a-z0-9.-]+\.loca\.lt' /tmp/lt.log | head -n1 || true)
                [ -n "$WEBHOOK_URL" ] && break
              done
              if [ -z "$WEBHOOK_URL" ]; then
                echo "!! localtunnel URL olinmadi" && cat /tmp/lt.log && exit 1
              fi
              echo ">> Vaqtinchalik webhook URL: $WEBHOOK_URL"
            fi

            # --- .env faylni qayta yozish ---
            cat > .env <<EOF
            GHCR_REPO=${GHCR_REPO}
            IMAGE_TAG=${IMAGE_TAG}
            PG_DB=${PG_DB}
            PG_USER=${PG_USER}
            PG_PASSWORD=${PG_PASSWORD}
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            TELEGRAM_BOT_ID=${TELEGRAM_BOT_ID}
            TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
            TELEGRAM_BOT_WEBHOOK_PATH=${WEBHOOK_URL}
            TELEGRAM_USER_AGREEMENT_LINK=${TELEGRAM_USER_AGREEMENT_LINK}
            SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
            EOF

            # --- Deploy ---
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f