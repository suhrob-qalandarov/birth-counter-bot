name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          mkdir -p "$DEPLOY_PATH"
          cp docker-compose.yml "$DEPLOY_PATH/"
          cp Dockerfile "$DEPLOY_PATH/" 2>/dev/null || true

      - name: Resolve webhook URL
        id: webhook
        env:
          WEBHOOK_FROM_VAR: ${{ vars.TELEGRAM_BOT_WEBHOOK_PATH }}
        run: |
          if [ -n "$WEBHOOK_FROM_VAR" ]; then
            echo ">> Webhook URL vars dan olindi"
            URL="$WEBHOOK_FROM_VAR"
          else
            echo ">> Webhook var bo'sh — localtunnel systemd servisidan URL o'qiladi"
            for i in $(seq 1 15); do
              URL=$(grep -oE 'https://[a-z0-9.-]+\.loca\.lt' /var/log/localtunnel.log | tail -n1 || true)
              [ -n "$URL" ] && break
              sleep 2
            done
            if [ -z "$URL" ]; then
              echo "!! localtunnel URL log'dan olinmadi. Servis holati:"
              systemctl status localtunnel --no-pager || true
              tail -50 /var/log/localtunnel.log || true
              exit 1
            fi
            echo ">> Webhook URL: $URL"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Write .env
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          PG_DB: ${{ vars.PG_DB }}
          PG_USER: ${{ vars.PG_USER }}
          PG_PASSWORD: ${{ vars.PG_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_ID: ${{ vars.TELEGRAM_BOT_ID }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_USER_AGREEMENT_LINK: ${{ vars.TELEGRAM_USER_AGREEMENT_LINK }}
          WEBHOOK_URL: ${{ steps.webhook.outputs.url }}
        run: |
          cat > "$DEPLOY_PATH/.env" <<EOF
          IMAGE_TAG=local
          PG_DB=${PG_DB}
          PG_USER=${PG_USER}
          PG_PASSWORD=${PG_PASSWORD}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_BOT_ID=${TELEGRAM_BOT_ID}
          TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
          TELEGRAM_BOT_WEBHOOK_PATH=${WEBHOOK_URL}
          TELEGRAM_USER_AGREEMENT_LINK=${TELEGRAM_USER_AGREEMENT_LINK}
          SPRING_PROFILES_ACTIVE=prod
          EOF

      - name: Build image locally
        run: docker build -t birthcounterbot:local .

      - name: Deploy with Docker Compose
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          cd "$DEPLOY_PATH"
          docker compose up -d
          docker image prune -f