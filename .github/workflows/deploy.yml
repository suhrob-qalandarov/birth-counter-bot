name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    env:
      STACK_NAME: bcb
      IMAGE_NAME: birthcounterbot
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          mkdir -p "$DEPLOY_PATH"
          cp docker-stack.yml "$DEPLOY_PATH/"

      - name: Resolve webhook URL
        id: webhook
        env:
          WEBHOOK_FROM_VAR: ${{ vars.TELEGRAM_BOT_WEBHOOK_PATH }}
        run: |
          if [ -n "$WEBHOOK_FROM_VAR" ]; then
            echo ">> Webhook URL vars dan olindi"
            URL="$WEBHOOK_FROM_VAR"
          else
            echo ">> Webhook var bo'sh — cloudflared systemd servisidan URL o'qiladi"
            for i in $(seq 1 15); do
              URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /var/log/cloudflared.log | tail -n1 || true)
              [ -n "$URL" ] && break
              sleep 2
            done
            if [ -z "$URL" ]; then
              echo "!! cloudflared URL log'dan olinmadi. Servis holati:"
              systemctl status cloudflared-tunnel --no-pager || true
              tail -50 /var/log/cloudflared.log || true
              exit 1
            fi
            echo ">> Webhook URL: $URL"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Write .env
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          PG_DB: ${{ vars.PG_DB }}
          PG_USER: ${{ vars.PG_USER }}
          PG_PASSWORD: ${{ vars.PG_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_ID: ${{ vars.TELEGRAM_BOT_ID }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_BOT_WEBHOOK_PATH: ${{ vars.TELEGRAM_BOT_WEBHOOK_PATH }}
          TELEGRAM_USER_AGREEMENT_LINK: ${{ vars.TELEGRAM_USER_AGREEMENT_LINK }}
          WEBHOOK_URL: ${{ steps.webhook.outputs.url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          clean() { printf '%s' "$1" | tr -d '\r\n'; }
          {
            printf 'IMAGE_TAG=%s\n'                     "$(clean "$IMAGE_TAG")"
            printf 'PG_DB=%s\n'                         "$(clean "$PG_DB")"
            printf 'PG_USER=%s\n'                       "$(clean "$PG_USER")"
            printf 'PG_PASSWORD=%s\n'                   "$(clean "$PG_PASSWORD")"
            printf 'TELEGRAM_BOT_TOKEN=%s\n'            "$(clean "$TELEGRAM_BOT_TOKEN")"
            printf 'TELEGRAM_BOT_ID=%s\n'               "$(clean "$TELEGRAM_BOT_ID")"
            printf 'TELEGRAM_BOT_USERNAME=%s\n'         "$(clean "$TELEGRAM_BOT_USERNAME")"
            printf 'TELEGRAM_BOT_WEBHOOK_PATH=%s\n'     "$(clean "$WEBHOOK_URL")"
            printf 'TELEGRAM_USER_AGREEMENT_LINK=%s\n'  "$(clean "$TELEGRAM_USER_AGREEMENT_LINK")"
            printf 'SPRING_PROFILES_ACTIVE=prod\n'
          } > "$DEPLOY_PATH/.env"

      - name: Build image locally
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" -t "${IMAGE_NAME}:latest" .

      - name: Deploy stack to Swarm
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          cd "$DEPLOY_PATH"
          set -a
          . ./.env
          set +a
          docker stack deploy \
            --detach=false \
            --resolve-image=never \
            -c docker-stack.yml \
            "$STACK_NAME"
          docker image prune -f