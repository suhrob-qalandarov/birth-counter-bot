# Docker Stack configuration for Birth Counter Bot application
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - target: 5432
        published: 5432
        host_ip: 127.0.0.1
        mode: host
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [bcb]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 5s

  app:
    image: birthcounterbot:${IMAGE_TAG:-local}
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_ID: ${TELEGRAM_BOT_ID}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_BOT_WEBHOOK_PATH: ${TELEGRAM_BOT_WEBHOOK_PATH}
      TELEGRAM_USER_AGREEMENT_LINK: ${TELEGRAM_USER_AGREEMENT_LINK}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: ingress
    networks: [bcb]
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
        delay: 5s
      rollback_config:
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s

volumes:
  pgdata:

networks:
  bcb:
    driver: overlay